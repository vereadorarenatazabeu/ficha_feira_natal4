<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feira das Empreendedoras - Cadastro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      min-height: 100%; 
      font-family: 'Roboto', Arial, sans-serif;
      /* Imagem como fundo fixo para evitar cortes */
      background: url('https://i.imgur.com/VM4kjwQ.jpeg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Permite rolar se o form for grande */
      padding: 40px 0;
    }

    .form-container { 
      width: 90%; 
      max-width: 500px;
      padding: 25px;
      background: rgba(0, 0, 0, 0.45); /* Fundo escuro semi-transparente */
      backdrop-filter: blur(10px); /* Efeito de desfoque */
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    
    label { display: flex; flex-direction: column; font-weight: 600; margin-bottom: 12px; font-size: 11px; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px; }
    
    input, select { 
      padding: 10px; 
      border-radius: 8px; 
      border: 1px solid rgba(255, 255, 255, 0.4); 
      font-size: 14px; 
      width: 100%; 
      margin-top: 4px; 
      background: rgba(255, 255, 255, 0.9); 
      color: #000; 
      font-weight: 500;
    }

    input[type=submit] { 
      width: 100%; 
      padding: 15px; 
      font-size: 15px; 
      background: #6B46C1; 
      color: #fff; 
      border: none; 
      cursor: pointer; 
      margin-top: 20px; 
      border-radius: 10px; 
      font-weight: 700; 
      text-transform: uppercase; 
      box-shadow: 0 4px 15px rgba(107, 70, 193, 0.4);
      transition: 0.3s; 
    }

    input[type=submit]:hover { background: #553399; transform: scale(1.02); }
    input[type=submit]:disabled { background: #666; cursor: not-allowed; }

    .msg { text-align: center; font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 13px; display: none; background: #fff; }
    .msg.success { color: #155724; border-left: 5px solid #28a745; }
    
    #outroSegmentoDiv { display: none; margin-top: -5px; margin-bottom: 10px; }
    
    .file-wrapper input[type="file"] { 
      background: rgba(255, 255, 255, 0.1); 
      color: #fff; 
      border: 1px dashed rgba(255,255,255,0.5); 
    }

    @media (max-width: 480px) {
      body { padding: 20px 0; }
      .form-container { width: 95%; padding: 15px; }
      input, select { font-size: 16px; padding: 12px; } /* Evita zoom no iPhone */
    }
  </style>

  <script>
    // IMPORTANTE: COLOQUE AQUI A SUA URL GERADA NO DEPLOY DO GOOGLE
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxShr5HJ1vSpPUwevsCNzXobQhnv33T7zZYQWnwObkOv8PmST7d7J0Lv70prNv8jHTB/exec';

    function mascarar(input, tipo){
      let v = input.value.replace(/\D/g,'');
      if(tipo==='cep'){
        if(v.length>5) v=v.slice(0,5)+'-'+v.slice(5,8);
        input.value=v;
      } else if(tipo==='whatsapp'){
        if(v.length>11) v=v.slice(0,11);
        if(v.length>6) input.value='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
        else if(v.length>2) input.value='('+v.slice(0,2)+') '+v.slice(2);
        else input.value=v;
      } else if(tipo==='dataNascimento'){
        if(v.length>8) v=v.slice(0,8);
        if(v.length>4) v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4,8);
        else if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2,4);
        input.value=v;
      }
    }

    async function buscarCep(){
      const cepInput = document.getElementById('cep');
      const cep = cepInput.value.replace(/\D/g,'');
      if(cep.length !== 8) return;
      try {
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await res.json();
        if(!data.erro){
          document.getElementById('endereco').value = data.logradouro;
          document.getElementById('bairro').value = data.bairro;
        }
      } catch(e) { console.error('Erro CEP'); }
    }

    function mostrarOutro(){
      document.getElementById('outroSegmentoDiv').style.display = 
        document.getElementById('segmento').value==='Outro' ? 'block' : 'none';
    }

    async function enviarDados(event){
      event.preventDefault();
      const submitBtn = document.querySelector('input[type="submit"]');
      const msgDiv = document.getElementById('msg');
      const file = document.getElementById('logo').files[0];

      submitBtn.disabled = true;
      submitBtn.value = 'ENVIANDO...';
      msgDiv.style.display = 'block';
      msgDiv.textContent = 'Enviando cadastro...';

      const segmentoFinal = document.getElementById('segmento').value === 'Outro' 
        ? document.getElementById('outroSegmento').value 
        : document.getElementById('segmento').value;

      const dados = {
        nome: document.getElementById('nome').value,
        dataNascimento: document.getElementById('dataNascimento').value,
        whatsapp: document.getElementById('whatsapp').value,
        nomeMarca: document.getElementById('nomemarca').value,
        cep: document.getElementById('cep').value,
        endereco: document.getElementById('endereco').value,
        bairro: document.getElementById('bairro').value,
        numero: document.getElementById('numero').value,
        segmento: segmentoFinal,
        instagram: document.getElementById('instagram').value
      };

      if(file) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          dados.logoBase64 = e.target.result.split(',')[1];
          dados.logoMimeType = file.type;
          dados.logoName = file.name;
          await executarFetch(dados, submitBtn, msgDiv);
        };
        reader.readAsDataURL(file);
      } else {
        await executarFetch(dados, submitBtn, msgDiv);
      }
    }

    async function executarFetch(dados, btn, msg) {
      try {
        await fetch(WEBAPP_URL, {
          method: 'POST',
          body: JSON.stringify(dados),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        msg.textContent = '✅ Cadastro enviado com sucesso!';
        msg.className = 'msg success';
        document.querySelector('form').reset();
      } catch(e) {
        msg.textContent = '✅ Cadastro enviado com sucesso!';
        msg.className = 'msg success';
        document.querySelector('form').reset();
      } finally {
        btn.disabled = false;
        btn.value = 'ENVIAR CADASTRO';
      }
    }
  </script>
</head>
<body>
  <div class="form-container">
    <form onsubmit="enviarDados(event)">
      <label>NOME <input type="text" id="nome" required></label>
      <label>DATA DE NASCIMENTO <input type="text" id="dataNascimento" required oninput="mascarar(this,'dataNascimento')" placeholder="dd/mm/aaaa"></label>
      <label>WHATSAPP <input type="text" id="whatsapp" required oninput="mascarar(this,'whatsapp')" placeholder="(99) 99999-9999"></label>
      <label>NOME DA MARCA <input type="text" id="nomemarca" required></label>
      <label>CEP <input type="text" id="cep" required oninput="mascarar(this,'cep')" onblur="buscarCep()"></label>
      <label>ENDEREÇO <input type="text" id="endereco" required></label>
      <label>BAIRRO <input type="text" id="bairro" required></label>
      <label>NÚMERO <input type="text" id="numero" required></label>
      <label>SEGMENTO
        <select id="segmento" onchange="mostrarOutro()" required>
          <option value="" disabled selected hidden>Selecione...</option>
          <option>Artesanato</option><option>Moda</option><option>Gastronomia</option>
          <option>Beleza</option><option>Serviços</option><option>Outro</option>
        </select>
      </label>
      <div id="outroSegmentoDiv"><input type="text" id="outroSegmento" placeholder="Qual segmento?"></div>
      <label>INSTAGRAM <input type="text" id="instagram" placeholder="@seu_perfil"></label>
      <label class="file-wrapper">LOGO (OPCIONAL) <input type="file" id="logo" accept="image/*"></label>
      <input type="submit" value="ENVIAR CADASTRO">
      <div id="msg" class="msg"></div>
    </form>
  </div>
</body>
</html>
